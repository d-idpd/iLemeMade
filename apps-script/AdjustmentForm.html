<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventory Adjustment — iLemeMade</title>
<style>
  :root {
    --bg: #f5f0ff;
    --card: #ffffff;
    --primary: #7c3aed;
    --primary-dark: #5b21b6;
    --text: #1e1333;
    --muted: #6b7280;
    --border: #e5e7eb;
    --success-bg: #d1fae5;
    --success: #065f46;
    --error-bg: #fee2e2;
    --error: #991b1b;
    --radius: 10px;
    --add-bg: #ecfdf5; --add-border: #6ee7b7; --add-text: #065f46;
    --remove-bg: #fff7ed; --remove-border: #fcd34d; --remove-text: #92400e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
  h1 { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .subtitle { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }
  .card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.08); max-width: 480px; margin: 0 auto; }
  label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .03em; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 1rem; color: var(--text); background: #faf9ff; outline: none; transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); }
  .field { margin-bottom: 16px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
  .type-btn {
    padding: 10px 8px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; text-align: center; font-size: .85rem;
    font-weight: 600; color: var(--muted); transition: all .15s; line-height: 1.3;
  }
  .type-btn:hover { border-color: var(--primary); color: var(--primary); }
  .type-btn.selected-add    { border-color: var(--add-border);    background: var(--add-bg);    color: var(--add-text); }
  .type-btn.selected-remove { border-color: var(--remove-border); background: var(--remove-bg); color: var(--remove-text); }
  .impact-box { border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: .9rem; font-weight: 600; display: none; }
  .impact-box.add    { background: var(--add-bg);    border: 1.5px solid var(--add-border);    color: var(--add-text); }
  .impact-box.remove { background: var(--remove-bg); border: 1.5px solid var(--remove-border); color: var(--remove-text); }
  .qty-row { display: flex; align-items: center; gap: 10px; }
  .qty-btn { width: 36px; height: 36px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--card); font-size: 1.2rem; cursor: pointer; flex-shrink: 0; }
  #qty { text-align: center; width: 80px; flex-shrink: 0; }
  .stock-badge { font-size: .75rem; color: var(--muted); }
  button[type=submit] {
    width: 100%; padding: 13px; background: var(--primary); color: #fff;
    border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: background .15s; margin-top: 4px;
  }
  button[type=submit]:hover { background: var(--primary-dark); }
  button[type=submit]:disabled { background: var(--muted); cursor: not-allowed; }
  .msg { display: none; padding: 12px 14px; border-radius: 8px; font-size: .9rem; font-weight: 600; margin-top: 14px; }
  .msg.success { display: block; background: var(--success-bg); color: var(--success); }
  .msg.error   { display: block; background: var(--error-bg);   color: var(--error); }
  .hint { font-size: .72rem; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>
<div class="card">
  <h1>📦 Inventory Adjustment</h1>
  <p class="subtitle">Add production, log gifts, promos & damage</p>
  <form id="adjForm">

    <div class="field">
      <label>Type of Adjustment</label>
      <div class="type-grid">
        <button type="button" class="type-btn" data-type="Production" data-dir="add">➕ Production<br><small>Items you made</small></button>
        <button type="button" class="type-btn" data-type="Damaged"    data-dir="remove">🔴 Damaged<br><small>Can't be sold</small></button>
        <button type="button" class="type-btn" data-type="Gift"       data-dir="remove">🎁 Gift<br><small>Given to someone</small></button>
        <button type="button" class="type-btn" data-type="Promo"      data-dir="remove">📣 Promo / Ad<br><small>Sample / display</small></button>
      </div>
      <input type="hidden" id="adjType" name="adjType" required>
    </div>

    <div class="impact-box" id="impactBox"></div>

    <div class="field">
      <label for="productId">Product</label>
      <select id="productId" name="productId" required>
        <option value="">— loading… —</option>
      </select>
    </div>

    <div class="field">
      <label>Quantity</label>
      <div class="qty-row">
        <button type="button" class="qty-btn" id="qtyMinus">−</button>
        <input type="number" id="qty" name="qty" value="1" min="1" max="999">
        <button type="button" class="qty-btn" id="qtyPlus">+</button>
        <span class="stock-badge" id="stockBadge"></span>
      </div>
      <div class="hint">Always enter a positive number — the direction is set by the type above.</div>
    </div>

    <div class="row2">
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>
      </div>
    </div>

    <div class="field">
      <label for="notes">Notes (optional)</label>
      <input type="text" id="notes" name="notes" placeholder="Details about this adjustment…">
    </div>

    <button type="submit" id="submitBtn">Save Adjustment</button>
    <div class="msg" id="msg"></div>
  </form>
</div>

<script>
(function () {
  const form       = document.getElementById('adjForm');
  const productSel = document.getElementById('productId');
  const qtySel     = document.getElementById('qty');
  const dateSel    = document.getElementById('date');
  const adjTypeIn  = document.getElementById('adjType');
  const submitBtn  = document.getElementById('submitBtn');
  const msg        = document.getElementById('msg');
  const impactBox  = document.getElementById('impactBox');
  const stockBadge = document.getElementById('stockBadge');
  const typeBtns   = document.querySelectorAll('.type-btn');

  let selectedDir = '';

  dateSel.value = new Date().toISOString().split('T')[0];

  // Load products
  google.script.run
    .withSuccessHandler(function (list) {
      productSel.innerHTML = '<option value="">— pick a product —</option>';
      list.forEach(function (p) {
        const opt = document.createElement('option');
        opt.value = p.productId;
        opt.textContent = p.productName + (p.trackingType === 'Quantity' ? ' (' + (p.stockQty || 0) + ' in stock)' : '');
        opt.dataset.stock = p.stockQty !== undefined ? p.stockQty : '';
        productSel.appendChild(opt);
      });
    })
    .withFailureHandler(function () {
      productSel.innerHTML = '<option value="">⚠ Could not load products</option>';
    })
    .getProductsForForm();

  typeBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      typeBtns.forEach(function (b) { b.className = 'type-btn'; });
      const dir = btn.dataset.dir;
      btn.classList.add('selected-' + dir);
      adjTypeIn.value = btn.dataset.type;
      selectedDir = dir;
      updateImpact();
    });
  });

  productSel.addEventListener('change', function () {
    const opt = productSel.selectedOptions[0];
    stockBadge.textContent = opt && opt.dataset.stock !== '' ? opt.dataset.stock + ' in stock' : '';
    updateImpact();
  });

  [qtySel].forEach(function (el) { el.addEventListener('input', updateImpact); });

  document.getElementById('qtyMinus').addEventListener('click', function () {
    const v = parseInt(qtySel.value) || 1;
    if (v > 1) { qtySel.value = v - 1; updateImpact(); }
  });
  document.getElementById('qtyPlus').addEventListener('click', function () {
    qtySel.value = (parseInt(qtySel.value) || 1) + 1; updateImpact();
  });

  function updateImpact() {
    if (!selectedDir || !adjTypeIn.value) { impactBox.style.display = 'none'; return; }
    const qty     = parseInt(qtySel.value) || 0;
    const opt     = productSel.selectedOptions[0];
    const stock   = opt && opt.dataset.stock !== '' ? parseInt(opt.dataset.stock) : null;
    const typeLabel = adjTypeIn.value;
    let text = '';
    if (selectedDir === 'add') {
      text = '➕ ' + typeLabel + ': adds ' + qty + ' to inventory';
      if (stock !== null) text += ' → new stock: ' + (stock + qty);
    } else {
      text = '➖ ' + typeLabel + ': removes ' + qty + ' from inventory';
      if (stock !== null) {
        const after = stock - qty;
        text += ' → new stock: ' + Math.max(0, after);
        if (after < 0) text += ' ⚠ not enough stock';
      }
    }
    impactBox.textContent = text;
    impactBox.className = 'impact-box ' + selectedDir;
    impactBox.style.display = 'block';
  }

  function showMsg(type, text) {
    msg.className = 'msg ' + type;
    msg.textContent = text;
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!adjTypeIn.value)   { showMsg('error', 'Please select an adjustment type.'); return; }
    if (!productSel.value)  { showMsg('error', 'Please select a product.'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';
    msg.className = 'msg';

    const qtyVal = parseInt(qtySel.value) || 1;
    // Sign: Production = positive; all others = negative
    const signedQty = selectedDir === 'add' ? qtyVal : -qtyVal;

    const data = {
      date:           dateSel.value,
      productId:      productSel.value,
      itemId:         '',
      adjustmentType: adjTypeIn.value,
      qty:            signedQty,
      notes:          document.getElementById('notes').value.trim(),
    };

    google.script.run
      .withSuccessHandler(function (res) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save Adjustment';
        if (res && res.success) {
          const label = adjTypeIn.value;
          const sign  = signedQty > 0 ? '+' : '';
          showMsg('success', '✅ ' + label + ' recorded: ' + sign + signedQty + ' × ' + productSel.selectedOptions[0].textContent.split(' (')[0]);
          form.reset();
          dateSel.value = new Date().toISOString().split('T')[0];
          typeBtns.forEach(function (b) { b.className = 'type-btn'; });
          adjTypeIn.value = '';
          selectedDir = '';
          impactBox.style.display = 'none';
          // Reload updated stock counts
          google.script.run.withSuccessHandler(function (list) {
            productSel.innerHTML = '<option value="">— pick a product —</option>';
            list.forEach(function (p) {
              const opt = document.createElement('option');
              opt.value = p.productId;
              opt.textContent = p.productName + (p.trackingType === 'Quantity' ? ' (' + (p.stockQty || 0) + ' in stock)' : '');
              opt.dataset.stock = p.stockQty !== undefined ? p.stockQty : '';
              productSel.appendChild(opt);
            });
          }).getProductsForForm();
        } else {
          showMsg('error', '⚠ Error: ' + (res && res.error ? res.error : 'Unknown error'));
        }
      })
      .withFailureHandler(function (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save Adjustment';
        showMsg('error', '⚠ Failed: ' + err.message);
      })
      .submitAdjustment(data);
  });
})();
</script>
</body>
</html>
